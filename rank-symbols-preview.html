    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #1e1b4b 0%, #312e81 50%, #1e3a8a 100%);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            font-size: 3rem;
            margin-bottom: 2rem;
            text-shadow: 0 0 20px rgba(147, 51, 234, 0.5);
        }
        .filters {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        .filter-btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }
        .filter-btn.active {
            background: #9333ea;
            box-shadow: 0 0 20px rgba(147, 51, 234, 0.5);
        }
        .filter-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        .filter-btn.active:hover {
            background: #a855f7;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1.5rem;
        }
        .rank-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 1.5rem;
            border: 2px solid;
            transition: all 0.3s;
            text-align: center;
        }
        .rank-card:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }
        .symbol {
            font-size: 4rem;
            margin-bottom: 0.5rem;
            font-weight: bold;
            line-height: 1;
        }
        .title {
            font-size: 1.5rem;
            font-weight: 900;
            margin-bottom: 0.5rem;
        }
        .level-info {
            font-size: 0.875rem;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 0.5rem;
        }
        .description {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.6);
            font-style: italic;
            margin-top: 0.5rem;
        }
        .color-code {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 0.5rem;
        }
    </style>

        function renderRanks(filter = 'all') {
            const grid = document.getElementById('ranksGrid');
            let filtered = ranks;
            
            if (filter === 'early') filtered = ranks.filter(r => r.tier <= 30);
            else if (filter === 'mid') filtered = ranks.filter(r => r.tier > 30 && r.tier <= 60);
            else if (filter === 'late') filtered = ranks.filter(r => r.tier > 60);
            
            grid.innerHTML = filtered.map(rank => `
                <div class="rank-card" style="border-color: ${rank.color}80; background: ${rank.color}15;">
                    <div class="symbol" style="color: ${rank.color}">${rank.symbol}</div>
                    <div class="title" style="color: ${rank.color}">${rank.title}</div>
                    <div class="level-info">Level ${rank.level} • Tier ${rank.tier}</div>
                    <div class="description">${rank.desc}</div>
                    <div class="color-code">${rank.color}</div>
                </div>
            `).join('');
        }

        function filterRanks(type) {
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderRanks(type);
        }

        renderRanks('all');
