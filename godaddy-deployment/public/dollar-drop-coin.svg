<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Outer ring gradient -->
    <radialGradient id="outerRing" cx="50%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#7dd3fc"/>
      <stop offset="20%" style="stop-color:#22c55e"/>
      <stop offset="60%" style="stop-color:#16a34a"/>
      <stop offset="100%" style="stop-color:#15803d"/>
    </radialGradient>
    
    <!-- Textured center -->
    <radialGradient id="centerTexture" cx="50%" cy="50%" r="60%">
      <stop offset="0%" style="stop-color:#86efac"/>
      <stop offset="40%" style="stop-color:#4ade80"/>
      <stop offset="80%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </radialGradient>
    
    <!-- Metallic texture pattern -->
    <pattern id="metalTexture" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" fill="#16a34a" opacity="0.3"/>
      <circle cx="2" cy="2" r="1" fill="#22c55e" opacity="0.5"/>
    </pattern>
    
    <!-- Shadow filter -->
    <filter id="coinShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="8" result="offset"/>
      <feFlood flood-color="#000000" flood-opacity="0.4"/>
      <feComposite in2="offset" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer coin ring with beautiful gradient -->
  <circle cx="200" cy="200" r="190" 
          fill="url(#outerRing)" 
          filter="url(#coinShadow)"
          stroke="#15803d" 
          stroke-width="3"/>
  
  <!-- Ridged edge pattern -->
  <circle cx="200" cy="200" r="175" 
          fill="none" 
          stroke="#84cc16" 
          stroke-width="2" 
          stroke-dasharray="4,3" 
          opacity="0.8"/>
  
  <!-- Second ridged ring -->
  <circle cx="200" cy="200" r="165" 
          fill="none" 
          stroke="#22c55e" 
          stroke-width="1.5" 
          stroke-dasharray="2,2" 
          opacity="0.6"/>
  
  <!-- Inner textured circle -->
  <circle cx="200" cy="200" r="155" 
          fill="url(#centerTexture)" 
          stroke="#16a34a" 
          stroke-width="2"/>
  
  <!-- Metallic texture overlay -->
  <circle cx="200" cy="200" r="145" 
          fill="url(#metalTexture)" 
          opacity="0.7"/>
  
  <!-- Dollar symbol with perfect "1" cutting through -->
  <g transform="translate(200,200)">
    <!-- Dollar sign curves -->
    <path d="M -45 -85 Q -70 -85 -70 -45 Q -70 -5 -45 -5 L 25 -5 Q 50 -5 50 35 Q 50 75 25 75 L -45 75" 
          fill="none" 
          stroke="#15803d" 
          stroke-width="12" 
          stroke-linecap="round"/>
    
    <!-- Dollar sign vertical lines -->
    <line x1="0" y1="-105" x2="0" y2="105" 
          stroke="#15803d" 
          stroke-width="12" 
          stroke-linecap="round"/>
    <line x1="-25" y1="-95" x2="-25" y2="95" 
          stroke="#15803d" 
          stroke-width="8" 
          stroke-linecap="round"/>
    <line x1="25" y1="-95" x2="25" y2="95" 
          stroke="#15803d" 
          stroke-width="8" 
          stroke-linecap="round"/>
    
    <!-- "1" cutting through - with perfect styling -->
    <g>
      <!-- White cutting outline -->
      <rect x="-20" y="-70" width="40" height="140" 
            fill="#ffffff" 
            rx="4" 
            opacity="0.9"/>
      
      <!-- Green "1" background -->
      <rect x="-18" y="-68" width="36" height="136" 
            fill="#22c55e" 
            rx="3"/>
      
      <!-- The "1" character -->
      <text x="0" y="25" 
            text-anchor="middle" 
            font-family="Arial, sans-serif" 
            font-size="90" 
            font-weight="bold" 
            fill="#ffffff" 
            stroke="#15803d" 
            stroke-width="1">1</text>
    </g>
  </g>
  
  <!-- Highlight shine effect -->
  <ellipse cx="160" cy="130" 
           rx="50" ry="25" 
           fill="#ffffff" 
           opacity="0.4" 
           transform="rotate(-25 160 130)"/>
  
  <!-- Secondary shine -->
  <ellipse cx="180" cy="150" 
           rx="25" ry="12" 
           fill="#ffffff" 
           opacity="0.3" 
           transform="rotate(-25 180 150)"/>
</svg>